<!DOCTYPE html>
<html lang="en">
<head>
    <title>CSS Grid</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="Garrett Holmes">
    <style>
        .wrapper{
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            grid-auto-rows: minmax(100px, auto);
            grid-gap: 1em;
            justify-items: stretch;
            align-items: stretch;

        }
        .wrapper > div{
            background: #eee;
            padding: 1em;
        }
        .wrapper > div:nth-child(odd){
            background: #ddd;
        }

        .box1{
            /*align-self: start;*/
            grid-column: 1/3;
            grid-row: 1/3;
        }

        .box2{
            /*align-self: end;*/
            grid-column: 3;
            grid-row: 1/3;
        }

        .box3{
            /*justify-self: end;*/
            grid-column: 2/4;
            grid-row: 3;
        }

        .box4{
            grid-column: 1;
            grid-row: 2/4;
        }

    </style>
    <!-- Custom CSS -->
    <link rel="stylesheet" type="text/css" href="style.css">
    <!-- Custom CSS End -->
</head>
<body>
    <div class="wrapper">
        <div class="box1">box1</div>
        <div class="box2">box2</div>
        <div class="box3">box3</div>
        <div class="box4">box4</div>
    </div>
</body>
